<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현숙의 단어장</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fff9f2;
  --card: #ffffff;
  --accent: #e8604c;
  --accent2: #f0a500;
  --accent3: #4caf8e;
  --text: #3a2e28;
  --muted: #a09080;
  --border: #f0ddd0;
  --green: #4caf8e;
  --red: #e8604c;
  --soft: #fff3eb;
}
body {
  font-family: 'Gowun Dodum', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(232,96,76,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(240,165,0,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}
.container { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; position: relative; z-index: 1; }

header { text-align: center; margin-bottom: 20px; padding: 24px 20px; background: var(--card); border-radius: 24px; border: 2px solid var(--border); box-shadow: 0 4px 20px rgba(232,96,76,0.08); }
.logo-emoji { font-size: 34px; display: block; margin-bottom: 4px; }
.logo { font-family: 'Gaegu', cursive; font-weight: 700; font-size: 40px; color: var(--accent); line-height: 1.1; }
.subtitle { font-size: 13px; color: var(--muted); margin-top: 6px; }
.subtitle span { color: var(--accent2); font-weight: 700; }

/* 주차 탭 */
.week-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.week-tab {
  flex: 1; padding: 10px 4px; border: 2px solid var(--border);
  border-radius: 12px; background: var(--card); color: var(--muted);
  font-family: 'Gowun Dodum', sans-serif; font-size: 13px; cursor: pointer;
  transition: all 0.2s; text-align: center;
}
.week-tab.active { border-color: var(--accent2); color: var(--accent2); background: #fff8e6; font-weight: 700; }

/* DAY 네비게이션 */
.day-nav {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border: 2px solid var(--border); border-radius: 18px;
  padding: 14px 18px; margin-bottom: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.day-info { display: flex; flex-direction: column; }
.day-label { font-family: 'Gaegu', cursive; font-size: 28px; color: var(--accent); line-height: 1; }
.day-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.day-topic { font-size: 13px; color: var(--accent2); font-weight: 700; margin-top: 2px; }
.nav-btns { display: flex; gap: 8px; }
.nav-btn {
  background: var(--soft); border: 2px solid var(--border); color: var(--text);
  width: 44px; height: 44px; border-radius: 12px; cursor: pointer;
  font-size: 18px; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.nav-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.day-dots { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; margin-bottom: 14px; }
.day-dot {
  width: 28px; height: 28px; border-radius: 50%; background: var(--soft);
  border: 2px solid var(--border); font-size: 11px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; font-family: 'Gowun Dodum', sans-serif;
}
.day-dot.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
.day-dot:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

/* 탭 */
.tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.tab {
  flex: 1; padding: 11px 8px; border: 2px solid var(--border);
  border-radius: 14px; background: var(--card); color: var(--muted);
  font-family: 'Gowun Dodum', sans-serif; font-size: 14px; cursor: pointer;
  transition: all 0.2s; text-align: center;
}
.tab.active { border-color: var(--accent); color: var(--accent); background: #fff5f3; font-weight: 700; }

/* 진행 바 */
.progress-bar { height: 8px; background: var(--border); border-radius: 10px; margin-bottom: 18px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 10px; transition: width 0.4s ease; }

/* 목록 */
.word-list { display: flex; flex-direction: column; gap: 10px; }
.word-item {
  background: var(--card); border: 2px solid var(--border); border-radius: 18px;
  padding: 16px 18px; transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.word-item:hover { border-color: rgba(232,96,76,0.3); box-shadow: 0 4px 16px rgba(232,96,76,0.08); }
.word-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.word-num { font-size: 13px; color: var(--muted); width: 22px; flex-shrink: 0; font-weight: 700; }
.word-en { font-family: 'Gaegu', cursive; font-size: 23px; font-weight: 700; color: var(--accent); }
.word-pos { font-size: 11px; color: var(--accent2); background: rgba(240,165,0,0.12); padding: 2px 9px; border-radius: 20px; }
.word-pronounce { font-size: 13px; color: var(--muted); padding-left: 32px; margin-bottom: 4px; }
.word-ko { font-size: 16px; color: var(--text); margin-bottom: 6px; padding-left: 32px; font-weight: 700; }
.word-example-row { display: flex; align-items: flex-start; gap: 8px; padding-left: 32px; }
.word-example { font-size: 13px; color: var(--muted); line-height: 1.5; flex: 1; }
.word-example-ko { font-size: 12px; color: var(--accent3); margin-top: 2px; }

.icon-btn {
  background: #fff5f3; border: 2px solid var(--border); color: var(--accent);
  border-radius: 10px; width: 32px; height: 32px; font-size: 14px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.icon-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: scale(1.08); }
.icon-btn.active { background: var(--accent); color: #fff; }

/* 플래시카드 */
.flashcard-wrap { perspective: 1200px; height: 300px; margin-bottom: 18px; cursor: pointer; user-select: none; }
.flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
.flashcard.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0; border-radius: 24px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border: 2px solid var(--border); padding: 28px; text-align: center;
  box-shadow: 0 6px 30px rgba(0,0,0,0.08);
}
.card-front { background: linear-gradient(135deg, #ffffff 0%, #fff8f4 100%); border-color: rgba(232,96,76,0.2); }
.card-back { background: linear-gradient(135deg, #f4fff9 0%, #e8f8f2 100%); border-color: rgba(76,175,142,0.3); transform: rotateY(180deg); }
.card-hint { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.card-word { font-family: 'Gaegu', cursive; font-size: 44px; font-weight: 700; color: var(--accent); margin-bottom: 4px; line-height: 1.1; }
.card-pronounce { font-size: 14px; color: var(--muted); margin-bottom: 8px; }
.card-pos { font-size: 13px; color: var(--accent2); background: rgba(240,165,0,0.12); padding: 3px 14px; border-radius: 20px; }
.card-btns { display: flex; gap: 10px; margin-top: 18px; }
.card-icon-btn {
  background: #fff5f3; border: 2px solid rgba(232,96,76,0.2); color: var(--accent);
  border-radius: 50%; width: 42px; height: 42px; font-size: 19px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.card-icon-btn:hover { background: var(--accent); color: #fff; transform: scale(1.1); }
.card-icon-btn.active { background: var(--accent); color: #fff; }
.card-meaning { font-size: 30px; font-weight: 700; color: var(--accent3); margin-bottom: 8px; }
.card-example { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 4px; }
.card-example-ko { font-size: 12px; color: var(--accent3); }
.card-ex-btns { display: flex; gap: 8px; margin-top: 12px; }
.card-counter { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 12px; }
.card-controls { display: flex; gap: 10px; justify-content: center; }
.ctrl-btn { padding: 13px 34px; border: none; border-radius: 14px; font-family: 'Gowun Dodum', sans-serif; font-size: 15px; cursor: pointer; transition: all 0.2s; }
.btn-prev { background: var(--soft); border: 2px solid var(--border); color: var(--text); }
.btn-next { background: var(--accent); color: #fff; font-weight: 700; border: 2px solid var(--accent); }
.btn-prev:hover { background: var(--border); }
.btn-next:hover { background: #d44e3c; }

/* 퀴즈 */
.quiz-score { text-align: center; font-size: 14px; color: var(--muted); margin-bottom: 14px; }
.quiz-question {
  background: var(--card); border: 2px solid rgba(232,96,76,0.2); border-radius: 20px;
  padding: 30px 20px; text-align: center; margin-bottom: 18px;
  box-shadow: 0 4px 20px rgba(232,96,76,0.06);
}
.quiz-q-label { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.quiz-word { font-family: 'Gaegu', cursive; font-size: 46px; font-weight: 700; color: var(--accent); margin-bottom: 4px; line-height: 1.1; }
.quiz-pos { font-size: 14px; color: var(--muted); }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.quiz-opt {
  background: var(--card); border: 2px solid var(--border); color: var(--text);
  padding: 16px 10px; border-radius: 14px; font-size: 15px;
  font-family: 'Gowun Dodum', sans-serif; cursor: pointer; transition: all 0.2s; line-height: 1.4;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #fff5f3; }
.quiz-opt.correct { border-color: var(--green) !important; background: rgba(76,175,142,0.1) !important; color: var(--green) !important; }
.quiz-opt.wrong { border-color: var(--red) !important; background: rgba(232,96,76,0.08) !important; color: var(--red) !important; }
.quiz-opt:disabled { cursor: default; }
.quiz-result { background: var(--card); border: 2px solid var(--border); border-radius: 20px; padding: 40px 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
.result-score { font-family: 'Gaegu', cursive; font-size: 84px; color: var(--accent); line-height: 1; margin-bottom: 10px; }
.result-label { font-size: 18px; color: var(--text); margin-bottom: 26px; line-height: 1.6; }
.retry-btn { padding: 13px 40px; background: var(--accent); border: none; border-radius: 14px; color: #fff; font-family: 'Gowun Dodum', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.retry-btn:hover { background: #d44e3c; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="logo-emoji">🌸</span>
    <div class="logo">현숙의 단어장</div>
    <div class="subtitle">하루 <span>10단어</span> · 4주 완성 실생활 영어</div>
  </header>

  <div class="week-tabs">
    <button class="week-tab active" data-week="0">1주차</button>
    <button class="week-tab" data-week="1">2주차</button>
    <button class="week-tab" data-week="2">3주차</button>
    <button class="week-tab" data-week="3">4주차</button>
  </div>

  <div class="day-dots" id="dayDots"></div>

  <div class="day-nav">
    <div class="day-info">
      <div class="day-label" id="dayLabel">DAY 1</div>
      <div class="day-topic" id="dayTopic"></div>
      <div class="day-sub" id="dayRange">단어 1–10</div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="btnPrevDay">←</button>
      <button class="nav-btn" id="btnNextDay">→</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-list">📋 단어 보기</div>
    <div class="tab" id="tab-card">🃏 카드 학습</div>
    <div class="tab" id="tab-quiz">🎯 퀴즈</div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:100%"></div>
  </div>

  <div id="listMode"><div class="word-list" id="wordList"></div></div>

  <div id="cardMode" class="hidden">
    <div class="card-counter" id="cardCounter">1 / 10</div>
    <div class="flashcard-wrap" id="flashcardWrap">
      <div class="flashcard" id="flashcard">
        <div class="card-face card-front">
          <div class="card-hint">👆 탭하면 뜻이 나타나요</div>
          <div class="card-word" id="cardWord"></div>
          <div class="card-pronounce" id="cardPronounce"></div>
          <div class="card-pos" id="cardPos"></div>
          <div class="card-btns">
            <button class="card-icon-btn" id="cardSpeakWord">🔊</button>
          </div>
        </div>
        <div class="card-face card-back">
          <div class="card-hint">✅ 뜻</div>
          <div class="card-meaning" id="cardMeaning"></div>
          <div class="card-example" id="cardExample"></div>
          <div class="card-example-ko" id="cardExampleKo"></div>
          <div class="card-ex-btns">
            <button class="card-icon-btn" id="cardSpeakEx">🔊</button>
          </div>
        </div>
      </div>
    </div>
    <div class="card-controls">
      <button class="ctrl-btn btn-prev" id="btnPrevCard">← 이전</button>
      <button class="ctrl-btn btn-next" id="btnNextCard">다음 →</button>
    </div>
  </div>

  <div id="quizMode" class="hidden">
    <div id="quizPlay">
      <div class="quiz-score" id="quizScore">점수: 0 / 0</div>
      <div class="quiz-question">
        <div class="quiz-q-label">이 단어의 뜻은 무엇일까요? 🤔</div>
        <div class="quiz-word" id="quizWord"></div>
        <div class="quiz-pos" id="quizPos"></div>
      </div>
      <div class="quiz-options" id="quizOptions"></div>
    </div>
    <div id="quizResult" class="quiz-result hidden">
      <div class="result-score" id="resultScore"></div>
      <div class="result-label" id="resultLabel"></div>
      <button class="retry-btn" id="btnRetry">🔄 다시 풀기</button>
    </div>
  </div>
</div>

<script>
var ALL_WORDS = [
  // ── 1주차 ── 기초 생활 영어
  // DAY 1 - 인사 / 기본 표현
  [
    { en:"hello", pr:"[헬로우]", pos:"표현", ko:"안녕하세요", ex:"Hello! How are you?", exko:"안녕하세요! 어떻게 지내세요?" },
    { en:"good morning", pr:"[굿 모닝]", pos:"표현", ko:"좋은 아침이에요", ex:"Good morning! Did you sleep well?", exko:"좋은 아침이에요! 잘 주무셨어요?" },
    { en:"thank you", pr:"[땡큐]", pos:"표현", ko:"감사합니다", ex:"Thank you very much!", exko:"정말 감사합니다!" },
    { en:"sorry", pr:"[쏘리]", pos:"표현", ko:"죄송합니다", ex:"I'm so sorry.", exko:"정말 죄송해요." },
    { en:"please", pr:"[플리즈]", pos:"부사", ko:"부탁합니다", ex:"Please help me.", exko:"도와주세요." },
    { en:"excuse me", pr:"[익스큐즈 미]", pos:"표현", ko:"실례합니다 / 저기요", ex:"Excuse me, where is the restroom?", exko:"실례합니다, 화장실이 어디인가요?" },
    { en:"yes", pr:"[예스]", pos:"표현", ko:"네", ex:"Yes, I understand.", exko:"네, 이해했어요." },
    { en:"no", pr:"[노우]", pos:"표현", ko:"아니요", ex:"No, thank you.", exko:"아니요, 괜찮아요." },
    { en:"help", pr:"[헬프]", pos:"동사/명사", ko:"돕다 / 도움", ex:"Can you help me, please?", exko:"도와주실 수 있나요?" },
    { en:"nice to meet you", pr:"[나이스 투 밋 유]", pos:"표현", ko:"만나서 반갑습니다", ex:"Nice to meet you!", exko:"만나서 반가워요!" }
  ],
  // DAY 2 - 숫자 / 시간
  [
    { en:"morning", pr:"[모닝]", pos:"명사", ko:"아침", ex:"I wake up early in the morning.", exko:"저는 아침에 일찍 일어나요." },
    { en:"afternoon", pr:"[애프터눈]", pos:"명사", ko:"오후", ex:"See you this afternoon.", exko:"오늘 오후에 봐요." },
    { en:"evening", pr:"[이브닝]", pos:"명사", ko:"저녁", ex:"Good evening, everyone.", exko:"안녕하세요, 여러분." },
    { en:"today", pr:"[투데이]", pos:"명사", ko:"오늘", ex:"What day is it today?", exko:"오늘이 무슨 요일이에요?" },
    { en:"tomorrow", pr:"[투마로우]", pos:"명사", ko:"내일", ex:"See you tomorrow!", exko:"내일 봐요!" },
    { en:"yesterday", pr:"[예스터데이]", pos:"명사", ko:"어제", ex:"I was busy yesterday.", exko:"어제는 바빴어요." },
    { en:"hour", pr:"[아워]", pos:"명사", ko:"시간", ex:"I'll be there in one hour.", exko:"한 시간 후에 도착할게요." },
    { en:"minute", pr:"[미닛]", pos:"명사", ko:"분", ex:"Wait five minutes, please.", exko:"5분만 기다려 주세요." },
    { en:"week", pr:"[윅]", pos:"명사", ko:"주, 일주일", ex:"I exercise three times a week.", exko:"일주일에 세 번 운동해요." },
    { en:"month", pr:"[먼쓰]", pos:"명사", ko:"달, 월", ex:"I visit my daughter every month.", exko:"매달 딸을 방문해요." }
  ],
  // DAY 3 - 가족 / 사람
  [
    { en:"family", pr:"[패밀리]", pos:"명사", ko:"가족", ex:"My family is very important to me.", exko:"가족은 저에게 매우 소중해요." },
    { en:"husband", pr:"[허즈번드]", pos:"명사", ko:"남편", ex:"My husband is a kind man.", exko:"제 남편은 친절한 사람이에요." },
    { en:"daughter", pr:"[도터]", pos:"명사", ko:"딸", ex:"My daughter lives in Seoul.", exko:"제 딸은 서울에 살아요." },
    { en:"son", pr:"[썬]", pos:"명사", ko:"아들", ex:"My son is a university student.", exko:"제 아들은 대학생이에요." },
    { en:"grandchild", pr:"[그랜드차일드]", pos:"명사", ko:"손자/손녀", ex:"I love my grandchildren.", exko:"손자들이 너무 사랑스러워요." },
    { en:"friend", pr:"[프렌드]", pos:"명사", ko:"친구", ex:"She is my best friend.", exko:"그녀는 제 가장 친한 친구예요." },
    { en:"neighbor", pr:"[네이버]", pos:"명사", ko:"이웃", ex:"My neighbor is very nice.", exko:"제 이웃은 매우 친절해요." },
    { en:"old", pr:"[올드]", pos:"형용사", ko:"나이 든 / 오래된", ex:"I am 63 years old.", exko:"저는 63살이에요." },
    { en:"young", pr:"[영]", pos:"형용사", ko:"젊은", ex:"She looks very young.", exko:"그녀는 매우 젊어 보여요." },
    { en:"happy", pr:"[해피]", pos:"형용사", ko:"행복한", ex:"I am very happy today.", exko:"오늘 정말 행복해요." }
  ],
  // DAY 4 - 병원 / 건강
  [
    { en:"hospital", pr:"[하스피틀]", pos:"명사", ko:"병원", ex:"I need to go to the hospital.", exko:"병원에 가야 해요." },

    { en:"peace", pr:"[피스]", pos:"명사", ko:"평화", ex:"I find peace in prayer.", exko:"기도에서 평화를 찾아요." },
    { en:"memory", pr:"[메모리]", pos:"명사", ko:"추억, 기억", ex:"I have wonderful memories.", exko:"아름다운 추억이 많아요." },
    { en:"past", pr:"[패스트]", pos:"명사", ko:"과거", ex:"The past was beautiful.", exko:"과거는 아름다웠어요." },
    { en:"future", pr:"[퓨처]", pos:"명사", ko:"미래", ex:"I am excited about the future.", exko:"미래가 기대돼요." },
    { en:"wisdom", pr:"[위즈덤]", pos:"명사", ko:"지혜", ex:"Experience brings wisdom.", exko:"경험이 지혜를 가져다줘요." },
    { en:"life", pr:"[라이프]", pos:"명사", ko:"삶, 인생", ex:"Life is beautiful.", exko:"삶은 아름다워요." }
  ],
  // DAY 27 - 음식점 심화 / 카페
  [
    { en:"coffee", pr:"[커피]", pos:"명사", ko:"커피", ex:"I drink coffee every morning.", exko:"매일 아침 커피를 마셔요." },
    { en:"tea", pr:"[티]", pos:"명사", ko:"차", ex:"Would you like some tea?", exko:"차 드실래요?" },
    { en:"juice", pr:"[주스]", pos:"명사", ko:"주스", ex:"I'd like an orange juice.", exko:"오렌지 주스 주세요." },
    { en:"cake", pr:"[케이크]", pos:"명사", ko:"케이크", ex:"The birthday cake is delicious.", exko:"생일 케이크가 맛있어요." },
    { en:"reservation", pr:"[레저베이션]", pos:"명사", ko:"예약", ex:"I have a reservation for two.", exko:"두 명 예약했어요." },
    { en:"vegetable", pr:"[베지터블]", pos:"명사", ko:"채소", ex:"I eat a lot of vegetables.", exko:"채소를 많이 먹어요." },
    { en:"fruit", pr:"[프루트]", pos:"명사", ko:"과일", ex:"I love eating fresh fruit.", exko:"신선한 과일을 좋아해요." },
    { en:"soup", pr:"[수프]", pos:"명사", ko:"국, 수프", ex:"This soup is perfect for cold days.", exko:"이 국은 추운 날에 딱이에요." },
    { en:"rice", pr:"[라이스]", pos:"명사", ko:"밥", ex:"Can I have more rice?", exko:"밥 좀 더 주세요." },
    { en:"wait", pr:"[웨이트]", pos:"동사", ko:"기다리다", ex:"Please wait a moment.", exko:"잠시만 기다려 주세요." }
  ],
  // DAY 28 - 마무리 복습 / 핵심 표현 모음
  [
    { en:"understand", pr:"[언더스탠드]", pos:"동사", ko:"이해하다", ex:"I don't understand. Can you repeat?", exko:"이해가 안 돼요. 다시 말씀해 주실 수 있나요?" },
    { en:"slowly", pr:"[슬로울리]", pos:"부사", ko:"천천히", ex:"Please speak more slowly.", exko:"더 천천히 말씀해 주세요." },
    { en:"again", pr:"[어겐]", pos:"부사", ko:"다시", ex:"Could you say that again?", exko:"다시 말씀해 주실 수 있나요?" },
    { en:"how much", pr:"[하우 머치]", pos:"표현", ko:"얼마예요?", ex:"How much is this?", exko:"이것은 얼마예요?" },
    { en:"where", pr:"[웨어]", pos:"의문사", ko:"어디", ex:"Where is the nearest station?", exko:"가장 가까운 역이 어디예요?" },
    { en:"how do I get to", pr:"[하우 두 아이 겟 투]", pos:"표현", ko:"어떻게 가나요?", ex:"How do I get to the hospital?", exko:"병원에 어떻게 가나요?" },
    { en:"I need", pr:"[아이 니드]", pos:"표현", ko:"~이 필요해요", ex:"I need some help.", exko:"도움이 필요해요." },
    { en:"Can you help me?", pr:"[캔 유 헬프 미?]", pos:"표현", ko:"도와주실 수 있나요?", ex:"Can you help me find this place?", exko:"이 장소를 찾도록 도와주실 수 있나요?" },
    { en:"I would like", pr:"[아이 우드 라이크]", pos:"표현", ko:"~을 원해요 / 주세요", ex:"I would like a cup of tea.", exko:"차 한 잔 주세요." },
    { en:"have a great day", pr:"[해브 어 그레이트 데이]", pos:"표현", ko:"좋은 하루 보내세요", ex:"Have a great day, everyone!", exko:"모두 좋은 하루 보내세요!" }
  ]
];

var TOPICS = [
  "인사 / 기본 표현","숫자 / 시간","가족 / 사람","병원 / 건강","음식 / 식당","쇼핑 / 마트","집 / 생활",
  "교통 / 길찾기","날씨","여행 준비","쇼핑 심화","은행 / 우체국","취미 / 여가","감정 / 상태",
  "병원 심화","음식 심화","전화 / 인터넷","날짜 / 계절","몸 / 신체","옷차림","감사 / 칭찬",
  "집 관리 / 수리","동네 / 장소","건강 관리","자녀 / 손자","종교 / 인생","카페 / 음식점","마무리 표현"
];

/* ─── STATE ─── */
var week = 0, day = 0, mode = 'list', cardIdx = 0, cardFlipped = false;
var quizWords = [], quizIdx = 0, quizScore = 0, quizAnswered = false;

function W() { return ALL_WORDS[day]; }
function setProgress(v, m) { document.getElementById('progressFill').style.width = Math.round(v/m*100)+'%'; }
function showOnly(id) {
  ['listMode','cardMode','quizMode'].forEach(function(s){
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

/* ─── TTS ─── */
function speak(text, rate) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = rate || 0.72;
  window.speechSynthesis.speak(u);
}
function flashBtn(btn) {
  btn.classList.add('active');
  setTimeout(function(){ btn.classList.remove('active'); }, 900);
}

/* ─── 주차 탭 ─── */
document.querySelectorAll('.week-tab').forEach(function(btn) {
  btn.onclick = function() {
    week = parseInt(btn.getAttribute('data-week'));
    day = week * 7;
    cardIdx = 0; cardFlipped = false;
    document.querySelectorAll('.week-tab').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    renderDots();
    updateDayInfo();
    go();
  };
});

/* ─── 날짜 점 ─── */
function renderDots() {
  var container = document.getElementById('dayDots');
  container.innerHTML = '';
  for (var i = 0; i < 7; i++) {
    var d = week * 7 + i;
    var dot = document.createElement('div');
    dot.className = 'day-dot' + (d === day ? ' active' : '');
    dot.textContent = d + 1;
    dot.setAttribute('data-day', d);
    dot.onclick = (function(dd) { return function() {
      day = dd; cardIdx = 0; cardFlipped = false;
      renderDots(); updateDayInfo(); go();
    }; })(d);
    container.appendChild(dot);
  }
}

function updateDayInfo() {
  document.getElementById('dayLabel').textContent = 'DAY ' + (day + 1);
  document.getElementById('dayTopic').textContent = '📚 ' + TOPICS[day];
  document.getElementById('dayRange').textContent = '단어 ' + (day * 10 + 1) + '–' + (day * 10 + 10);
}

/* ─── DAY NAV ─── */
document.getElementById('btnPrevDay').onclick = function() {
  var newDay = day - 1;
  if (newDay < 0) newDay = 27;
  day = newDay;
  week = Math.floor(day / 7);
  document.querySelectorAll('.week-tab').forEach(function(b, i){ b.classList.toggle('active', i === week); });
  cardIdx = 0; cardFlipped = false;
  renderDots(); updateDayInfo(); go();
};
document.getElementById('btnNextDay').onclick = function() {
  var newDay = day + 1;
  if (newDay > 27) newDay = 0;
  day = newDay;
  week = Math.floor(day / 7);
  document.querySelectorAll('.week-tab').forEach(function(b, i){ b.classList.toggle('active', i === week); });
  cardIdx = 0; cardFlipped = false;
  renderDots(); updateDayInfo(); go();
};

/* ─── 탭 ─── */
['list','card','quiz'].forEach(function(m) {
  document.getElementById('tab-'+m).onclick = function() {
    mode = m;
    ['list','card','quiz'].forEach(function(x){
      document.getElementById('tab-'+x).classList.toggle('active', x===m);
    });
    go();
  };
});
function go() {
  if (mode==='list') doList();
  else if (mode==='card') doCard();
  else doQuizStart();
}

/* ─── LIST ─── */
function doList() {
  showOnly('listMode');
  var w = W(), html = '';
  for (var i = 0; i < w.length; i++) {
    html += '<div class="word-item">'
      + '<div class="word-top">'
      + '<span class="word-num">'+(i+1)+'.</span>'
      + '<span class="word-en">'+w[i].en+'</span>'
      + '<span class="word-pos">'+w[i].pos+'</span>'
      + '<button class="icon-btn" data-action="speak-word" data-idx="'+i+'">🔊</button>'
      + '</div>'
      + '<div class="word-pronounce">'+w[i].pr+'</div>'
      + '<div class="word-ko">'+w[i].ko+'</div>'
      + '<div class="word-example-row">'
      + '<div><div class="word-example">'+w[i].ex+'</div>'
      + '<div class="word-example-ko">→ '+w[i].exko+'</div></div>'
      + '<button class="icon-btn" data-action="speak-ex" data-idx="'+i+'" style="flex-shrink:0;margin-top:2px">🔊</button>'
      + '</div>'
      + '</div>';
  }
  document.getElementById('wordList').innerHTML = html;
  document.getElementById('wordList').onclick = function(e) {
    var btn = e.target.closest('[data-action]');
    if (!btn) return;
    var idx = parseInt(btn.getAttribute('data-idx'));
    if (btn.getAttribute('data-action') === 'speak-word') { speak(W()[idx].en); flashBtn(btn); }
    else { speak(W()[idx].ex, 0.78); flashBtn(btn); }
  };
  setProgress(10,10);
}

/* ─── CARD ─── */
function doCard() {
  showOnly('cardMode');
  var fc = document.getElementById('flashcard');
  fc.style.transition = 'none';
  fc.classList.remove('flipped');
  cardFlipped = false;
  fc.offsetHeight;
  fc.style.transition = '';
  var w = W()[cardIdx];
  document.getElementById('cardWord').textContent = w.en;
  document.getElementById('cardPronounce').textContent = w.pr;
  document.getElementById('cardPos').textContent = w.pos;
  document.getElementById('cardMeaning').textContent = w.ko;
  document.getElementById('cardExample').textContent = w.ex;
  document.getElementById('cardExampleKo').textContent = '→ ' + w.exko;
  document.getElementById('cardCounter').textContent = (cardIdx+1)+' / 10';
  setProgress(cardIdx+1,10);
}
document.getElementById('flashcardWrap').onclick = function() {
  cardFlipped = !cardFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', cardFlipped);
};
document.getElementById('cardSpeakWord').onclick = function(e) { e.stopPropagation(); speak(W()[cardIdx].en); flashBtn(this); };
document.getElementById('cardSpeakEx').onclick = function(e) { e.stopPropagation(); speak(W()[cardIdx].ex, 0.78); flashBtn(this); };
document.getElementById('btnPrevCard').onclick = function(e) { e.stopPropagation(); cardIdx = (cardIdx-1+10)%10; doCard(); };
document.getElementById('btnNextCard').onclick = function(e) { e.stopPropagation(); cardIdx = (cardIdx+1)%10; doCard(); };

/* ─── QUIZ ─── */
function doQuizStart() {
  showOnly('quizMode');
  quizWords = W().slice().sort(function(){ return Math.random()-0.5; });
  quizIdx = 0; quizScore = 0; quizAnswered = false;
  document.getElementById('quizResult').classList.add('hidden');
  document.getElementById('quizPlay').classList.remove('hidden');
  doQuizQuestion();
}
function doQuizQuestion() {
  if (quizIdx >= 10) { doQuizResult(); return; }
  quizAnswered = false;
  var w = quizWords[quizIdx];
  document.getElementById('quizWord').textContent = w.en;
  document.getElementById('quizPos').textContent = w.pr;
  document.getElementById('quizScore').textContent = '점수: '+quizScore+' / '+quizIdx;
  setProgress(quizIdx, 10);
  var others = W().filter(function(x){ return x.en !== w.en; }).sort(function(){ return Math.random()-0.5; }).slice(0,3);
  var opts = others.concat([w]).sort(function(){ return Math.random()-0.5; });
  var container = document.getElementById('quizOptions');
  container.innerHTML = '';
  opts.forEach(function(opt) {
    (function(o) {
      var btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.textContent = o.ko;
      btn.onclick = function() { pickAnswer(btn, o.ko === w.ko, container, w.ko); };
      container.appendChild(btn);
    })(opt);
  });
}
function pickAnswer(btn, correct, container, correctKo) {
  if (quizAnswered) return;
  quizAnswered = true;
  var btns = container.querySelectorAll('.quiz-opt');
  btns.forEach(function(b){ b.disabled = true; });
  if (correct) { btn.classList.add('correct'); quizScore++; }
  else {
    btn.classList.add('wrong');
    btns.forEach(function(b){ if (b.textContent === correctKo) b.classList.add('correct'); });
  }
  setTimeout(function(){ quizIdx++; doQuizQuestion(); }, 1300);
}
function doQuizResult() {
  document.getElementById('quizPlay').classList.add('hidden');
  document.getElementById('quizResult').classList.remove('hidden');
  document.getElementById('resultScore').textContent = quizScore+'/10';
  var msgs = [
    '🤗 괜찮아요! 천천히 다시 해봐요.',
    '😊 잘하고 있어요! 조금만 더 연습해요.',
    '👏 훌륭해요! 많이 외우셨네요!',
    '🏆 완벽합니다! 정말 대단하세요!'
  ];
  document.getElementById('resultLabel').textContent = msgs[quizScore<=4?0:quizScore<=6?1:quizScore<=8?2:3];
  document.getElementById('quizScore').textContent = '최종 점수: '+quizScore+' / 10';
  setProgress(10,10);
}
document.getElementById('btnRetry').onclick = doQuizStart;

/* ─── INIT ─── */
renderDots();
updateDayInfo();
doList();
</script>
</body>
</html>
